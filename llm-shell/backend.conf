# Valence LLM backend — THE one place to change when plugging a different
# model into the system. Read by bin/llm on every headless call.
#
# BACKEND: which adapter case in bin/llm to use (today only claude-cli exists;
#          a new provider needs a small adapter case added there first).
# BIN:     the provider binary.
# MODEL:   optional model id; empty = the provider account's default.
BACKEND=claude-cli
BIN=/usr/bin/claude
MODEL=
